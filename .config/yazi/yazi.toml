[mgr]
ratio = [1,4,4]
linemode = "size"

[preview]
max_width = 1200
max_height = 1800
cache_dir = "~/.cache/yazi/"

[[plugin.prepend_fetchers]]
id   = "git"
url = "*"
run  = "git"
group = "git"

[[plugin.prepend_fetchers]]
id   = "git"
url = "*/"
run  = "git"
group = "git"

[plugin]
prepend_preloaders = [
    # libvips (via vipsmeta wrapper) for heic/avif/jxl + svg + camera RAW; keeps mediainfo overlay
    { mime = "image/{avif,hei?,jxl,svg+xml,png}", run = "vipsmeta" },
    { url = "*.{crw,cr2,cr3,nef,nrw,arw,srf,sr2,raf,orf,rw2,raw,pef,ptx,dng,rwl,srw,x3f}", run = "vipsmeta" },
    # NOTE: EPS has no preloader (yazi caps preloaders at 16); epsmeta previews it on demand.
    # Replace magick, image, video with mediainfo
    { mime = "{audio,video,image}/*", run = "mediainfo" },
    { mime = "application/subrip", run = "mediainfo" },
    # Office Documents
    { mime = "application/{openxmlformats-officedocument.*,oasis.opendocument.*,ms-*,msword}", run = "office" },
    { url = "*.docx", run = "office" },
    # 3d objects
    { url = "*.{3mf,obj,pts,ply,stl,step,stp}", run = "f3d-preview" },
]
prepend_previewers = [
    # libvips (via vipsmeta wrapper) for heic/avif/jxl + svg + camera RAW; keeps mediainfo overlay
    { mime = "image/{avif,hei?,jxl,svg+xml,png}", run = "vipsmeta" },
    { url = "*.{crw,cr2,cr3,nef,nrw,arw,srf,sr2,raf,orf,rw2,raw,pef,ptx,dng,rwl,srw,x3f}", run = "vipsmeta" },
    # EPS/PostScript via Ghostscript (epsmeta wrapper); keeps mediainfo overlay
    { mime = "application/postscript", run = "epsmeta" },
    { url = "*.{eps,epsf,epsi}", run = "epsmeta" },
    # Text previews via CLI tools (html2text / jq / sqlite3); fall back to raw text on error
    { mime = "text/html", run = "cmdpreview html" },
    { url = "*.ipynb", run = "cmdpreview ipynb" },
    { url = "*.{sqlite,sqlite3,db}", run = "cmdpreview sqlite" },
    # Markdown previwer
    { url = "*.md", run = "glow" },
    # Archive previewer
    { mime = "application/*zip",            run = "ouch"      },
    { mime = "application/x-tar",           run = "ouch"      },
    { mime = "application/x-bzip2",         run = "ouch"      },
    { mime = "application/x-7z-compressed", run = "ouch"      },
    { mime = "application/x-rar",           run = "ouch"      },
    { mime = "application/x-xz",            run = "ouch"      },
    # { mime = "text/csv",                    run = "miller"    },
    # Replace magick, image, video with mediainfo
    { mime = "{audio,video,image}/*",       run = "mediainfo" },
    { mime = "application/subrip",          run = "mediainfo" },
    { mime = "application/postscript", run = "mediainfo" },
    # Office Documents
    { mime = "application/openxmlformats-officedocument.*", run = "office" },
    { mime = "application/oasis.opendocument.*", run = "office" },
    { mime = "application/ms-*", run = "office" },
    { mime = "application/msword", run = "office" },
    { url = "*.docx", run = "office" },
    # 3d objects
    { url = "*.3mf", run = "f3d-preview" },
    { url = "*.obj", run = "f3d-preview" },
    { url = "*.pts", run = "f3d-preview" },
    { url = "*.ply", run = "f3d-preview" },
    { url = "*.stl", run = "f3d-preview" },
    { url = "*.step", run = "f3d-preview" },
    { url = "*.stp", run = "f3d-preview" },
]

[opener]
show = [
    { run = 'handlr open -e false "$@"', desc = "Simple open"},
    ]

[open]
prepend_rules = [
    { mime = "image/*", use = [ "show" , "open", "reveal" ] },
    { mime = "video/*", use = [ "show" , "open", "reveal" ] },
    { mime = "audio/*", use = [ "show" , "open", "reveal" ] },
    { mime = "application/pdf", use = [ "show" , "open", "reveal" ] },
    ]
