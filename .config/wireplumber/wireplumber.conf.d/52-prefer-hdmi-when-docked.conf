# Prefer a docked monitor's HDMI/DisplayPort audio over the laptop speaker.
#
# Stock PipeWire ranks HDMI sinks (~600-700) below the laptop speaker (1000)
# because many monitors have no speakers. This monitor does, and audio should
# auto-switch to it when docked. Only the connected output's sink is "available"
# (per-port availability in the HiFi profile), so undocked these sinks are not
# default candidates regardless of priority; docked, only the connected one
# competes and wins.
#
# Priority target: Bluetooth (~1010) > docked monitor > laptop speaker (1000).
# So Bluetooth headphones still win if connected, monitor beats the speaker,
# speaker is the fallback when nothing external is present.
#
# The monitor on this dock is on output HDMI4 (DP-5, pcm=9). On monitor power-on
# the driver briefly reports several DP ports as "available" during EDID/link
# re-negotiation; with equal priority WirePlumber then picks the lowest-id sink
# (HDMI1/DP1) and sticks there. So give HDMI4 a slightly higher priority than the
# other HDMI outputs to win that tie. All HDMI outputs stay above the speaker so
# a different port still works if the setup changes (availability gates them).
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output\\.pci-.*\\.HiFi__HDMI.*__sink" }
    ]
    actions = {
      update-props = {
        priority.driver  = 1002
        priority.session = 1002
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_output\\.pci-.*\\.HiFi__HDMI4__sink" }
    ]
    actions = {
      update-props = {
        priority.driver  = 1005
        priority.session = 1005
      }
    }
  }
]
