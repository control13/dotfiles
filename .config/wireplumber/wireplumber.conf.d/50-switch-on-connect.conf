# Always route audio to the newest / highest-priority device (switch-on-connect).
# Disables restoring persisted default-node pins, per-stream targets and card
# profiles, so a newly connected sink (Bluetooth, dock HDMI, USB) automatically
# becomes the default and running streams follow it.
#
# device.restore-profile = false is required for dock audio: otherwise the HDMI
# card's profile is pinned to "pro-audio" (chosen while undocked, when its HiFi
# profiles are unavailable) and stays there even after docking, so WirePlumber
# never upgrades to the HiFi profile that exposes the connected monitor's sink.
# With restore disabled, the card is re-evaluated by priority on every change:
# docked -> HiFi (prio 13000), undocked -> pro-audio (phantom sinks, demoted by
# 51-demote-hdmi-pro-audio.conf).
wireplumber.settings = {
  node.restore-default-targets = false
  node.stream.restore-target   = false
  device.restore-profile       = false
}
