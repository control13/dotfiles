# Always route audio to the newest / highest-priority device (switch-on-connect).
# Disables restoring persisted default-node pins and per-stream targets, so a
# newly connected sink (Bluetooth, dock HDMI, USB) automatically becomes the
# default and running streams follow it.
wireplumber.settings = {
  node.restore-default-targets = false
  node.stream.restore-target   = false
}
