# Prefer wired laptop headphones over everything when plugged in.
#
# The laptop analog headphone jack is a separate sink (HiFi__Headphones__sink)
# that only exists while headphones are plugged in (the card switches to the
# "HiFi (Headphones, ...)" profile on jack detection). Its stock priority
# (~1000) sits below the docked monitor (HDMI4 = 1005) and Bluetooth (~1010),
# so plugging wired headphones while docked did not move audio to them.
#
# Boost it above those so a physical plug-in wins (an explicit user action).
# The sink is absent when nothing is plugged, so this rule is inert otherwise.
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output\\.pci-.*\\.HiFi__Headphones__sink" }
    ]
    actions = {
      update-props = {
        priority.driver  = 1020
        priority.session = 1020
      }
    }
  }
]
