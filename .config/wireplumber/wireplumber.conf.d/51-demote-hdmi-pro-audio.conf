# Demote phantom HDMI "pro-audio" sinks below the laptop speaker.
#
# When no external monitor is connected, the HDMI card's HiFi profiles are
# unavailable, so WirePlumber falls back to the "pro-audio" profile (priority 1
# > "off" priority 0). That profile exposes always-available pro-output-N sinks
# with a high node priority (~1196), which would otherwise win the default over
# the laptop speaker (1000) and produce silence.
#
# Lowering their priority makes the speaker the reliable fallback while real
# devices still win: Bluetooth (~1010) > speaker (1000) > phantom HDMI (200).
# A docked monitor activates the HDMI HiFi profile (its own priority), not these
# pro-output sinks, so dock audio auto-switch is unaffected.
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output\\.pci-.*\\.pro-output-.*" }
    ]
    actions = {
      update-props = {
        priority.driver  = 200
        priority.session = 200
      }
    }
  }
]
